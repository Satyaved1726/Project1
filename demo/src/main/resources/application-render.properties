# Render Production Profile
# For Render deployment with DATABASE_URL environment variable
# Spring will auto-configure datasource from environment if available
spring.config.import=optional:configserver:
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Database connection info - these are used by custom DataSourceConfiguration
# Render sets DATABASE_URL env variable in format: postgresql://user:password@host:port/database
