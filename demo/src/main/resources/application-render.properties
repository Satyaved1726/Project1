# ============================================================
# RENDER DEPLOYMENT PROFILE
# ============================================================
# Override default properties for Render environment
# Activate with: SPRING_PROFILES_ACTIVE=render
# Or via Render environment variable: SPRING_PROFILES_ACTIVE=render
#
# These settings optimize application for containerized
# Render deployment with Supabase PostgreSQL

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
# Connection string parsed by DataSourceConfiguration
# from PostgreSQL format to JDBC format with SSL
# DATABASE_URL environment variable is parsed to:
# jdbc:postgresql://db.hbnjxekpkomrezeiogxm.supabase.co:5432/postgres?sslmode=require

spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP tuned for Render container environment
# Reduced pool size due to container resource constraints
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# ============================================================
# JPA & HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# ============================================================
# SERVER CONFIGURATION FOR RENDER
# ============================================================
# Render injects PORT environment variable automatically
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful
server.servlet.session.timeout=30m

# Connection settings for production load
server.tomcat.max-connections=200
server.tomcat.max-threads=50
server.tomcat.min-spare-threads=10
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# ============================================================
# LOGGING FOR RENDER
# ============================================================
# Production logging - reduced verbosity
logging.level.root=INFO
logging.level.com.safevoice=INFO
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ============================================================
# ACTUATOR FOR MONITORING
# ============================================================
# Expose health endpoint for Render's health checks
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ============================================================
# PERFORMANCE OPTIMIZATION
# ============================================================
# Disable auto-reload in production
spring.devtools.restart.enabled=false

# Connection validation for long-lived connections
spring.datasource.hikari.connection-test-query=SELECT 1

# Cache configuration (if using Spring Cache)
spring.cache.type=simple

# ============================================================
# SECURITY
# ============================================================
# Enforce HTTPS in production (set if using custom domain)
# server.servlet.session.cookie.secure=true
# server.servlet.session.cookie.http-only=true
# server.servlet.session.cookie.same-site=strict

# ============================================================
# APPLICATION
# ============================================================
server.error.include-message=always
server.error.include-binding-errors=always
