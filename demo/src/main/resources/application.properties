spring.application.name=TRINETRA

# ============================================================
# DATABASE CONFIGURATION - Supabase PostgreSQL
# ============================================================
# Priority: Environment variables > application.properties defaults
# DATABASE_URL format: postgresql://user:password@host:port/database
# Parsed by DataSourceConfiguration into JDBC format with SSL

spring.datasource.driver-class-name=org.postgresql.Driver

# Connection string (from environment variables with fallback)
# Set DATABASE_URL or component-based variables (DB_USERNAME, DB_PASSWORD, DATABASE_HOST, etc.)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.hbnjxekpkomrezeiogxm.supabase.co:5432/postgres?user=postgres&password=satyaveddb1726&sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:satyaveddb1726}

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ============================================================
# JPA & HIBERNATE CONFIGURATION
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# ============================================================
# JWT CONFIGURATION
# ============================================================
jwt.secret=${JWT_SECRET:trinetra-secret-key-for-development}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================
# SECURITY CONFIGURATION
# ============================================================
security.jwt.header=Authorization
security.jwt.prefix=Bearer

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful
server.servlet.session.timeout=30m

# Enable OPTIONS request dispatching for CORS preflight requests
spring.mvc.dispatch-options-request=true

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging.level.root=INFO
logging.level.com.safevoice=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ============================================================
# CORS CONFIGURATION (Production)
# ============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.max-age=3600

# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
spring.application.description=TRINETRA - Secure Anonymous Whistleblower Reporting Platform
spring.application.version=1.0.0

