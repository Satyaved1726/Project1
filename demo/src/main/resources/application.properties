spring.application.name=TRINETRA

# PostgreSQL DATABASE CONFIGURATION
# For Render: DATABASE_URL env variable is parsed by DataSourceConfiguration
# For local dev: configure via environment variables or application-local.properties
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000

# JPA / HIBERNATE CONFIGURATION
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=${JWT_SECRET:trinetra-secret-key}
jwt.expiration=86400000

# Security Configuration
security.jwt.header=Authorization
security.jwt.prefix=Bearer

# Application Configuration (Render)
server.port=${PORT:8080}
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.com.safevoice=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS Configuration (Production)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.max-age=3600